<!doctype html>
<html lang="uz">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- ── Primary SEO ─────────────────────────────────────────────────── -->
    <title>ADBlogger — O'zbekiston Blogger va Reklama Platformasi</title>
    <meta name="description" content="ADBlogger — O'zbekistonning eng yirik blogger va reklama platformasi. 500+ tasdiqlangan blogger. Biznes va bloggerlarni birlashtiradi. Reklama joylashtiring yoki daromad oling!" />
    <meta name="keywords" content="blogger, reklama, marketing, O'zbekiston, influencer, SMM, instagram, youtube, telegram, tiktok, biznes, adblogger" />
    <meta name="author" content="ADBlogger" />
    <meta name="robots" content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1" />
    <meta name="theme-color" content="#e31e24" />
    <link rel="canonical" href="https://adblogger.uz/" />

    <!-- ── Favicons ────────────────────────────────────────────────────── -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="msapplication-TileColor" content="#e31e24" />

    <!-- ── Open Graph (Facebook, LinkedIn, Telegram) ──────────────────── -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="ADBlogger" />
    <meta property="og:locale" content="uz_UZ" />
    <meta property="og:locale:alternate" content="ru_RU" />
    <meta property="og:title" content="ADBlogger — O'zbekiston Blogger va Reklama Platformasi" />
    <meta property="og:description" content="O'zbekistonning eng yirik blogger va reklama platformasi. 500+ tasdiqlangan blogger. Reklama joylashtiring yoki daromad oling!" />
    <meta property="og:url" content="https://adblogger.uz/" />
    <meta property="og:image" content="https://adblogger.uz/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="ADBlogger — O'zbekiston Blogger va Reklama Platformasi" />

    <!-- ── Twitter / X Card ──────────────────────────────────────────── -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@adblogger_uz" />
    <meta name="twitter:creator" content="@adblogger_uz" />
    <meta name="twitter:title" content="ADBlogger — O'zbekiston Blogger va Reklama Platformasi" />
    <meta name="twitter:description" content="O'zbekistonning eng yirik blogger va reklama platformasi. 500+ tasdiqlangan blogger." />
    <meta name="twitter:image" content="https://adblogger.uz/og-image.png" />

    <!-- ── Structured Data — Organization ────────────────────────────── -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "ADBlogger",
      "url": "https://adblogger.uz",
      "logo": "https://adblogger.uz/favicon.svg",
      "description": "O'zbekistonning eng yirik blogger va reklama platformasi",
      "sameAs": [
        "https://t.me/adblogger_uz",
        "https://instagram.com/adblogger_uz"
      ],
      "contactPoint": {
        "@type": "ContactPoint",
        "contactType": "customer support",
        "email": "info@adblogger.uz",
        "availableLanguage": ["uz", "ru"]
      },
      "address": {
        "@type": "PostalAddress",
        "addressLocality": "Toshkent",
        "addressCountry": "UZ"
      }
    }
    </script>

    <!-- ── Structured Data — WebSite (sitelinks searchbox) ───────────── -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "ADBlogger",
      "url": "https://adblogger.uz",
      "potentialAction": {
        "@type": "SearchAction",
        "target": {
          "@type": "EntryPoint",
          "urlTemplate": "https://adblogger.uz/bloggers?q={search_term_string}"
        },
        "query-input": "required name=search_term_string"
      }
    }
    </script>

    <!-- ── Performance hints ──────────────────────────────────────────── -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="dns-prefetch" href="https://api.adblogger.uz" />
    <link rel="dns-prefetch" href="https://cdnjs.cloudflare.com" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
